name: Update Lotto History

on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * 6'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update lotto history JSON
        run: node scripts/update-lotto-history.js

      - name: Check generated file
        run: |
          ls -la
          head -80 lotto-history.json

      - name: Commit updated lotto history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update lotto history
          file_pattern: lotto-history.json
